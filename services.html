<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url("https://images.unsplash.com/photo-1607860108855-64acf2078ed9");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
        }

        /* Glass cards */
        .card {
            border: none;
            border-radius: 12px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        /* Header styles */
        .card-header {
            /* border-radius: 12px 12px 0 0 !important; */
            font-weight: bold;
        }

        /* Form fields */
        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.85);
        }

        /* Button style */
        .btn {
            border-radius: 30px;
            padding: 8px 20px;
        }

        /* service toggle buttons */
        /* #clinic_btn,
        #battery_btn {
            font-weight: 600;
            padding: 10px 25px;
            border-radius: 30px;
        } */

        /* message alerts */
        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .error {
            background: #dc3545;
            color: white;
        }

        .success {
            background: #28a745;
            color: white;
        }

        /* preview box */
        #tyre_preview .card,
        #battery_preview .card {
            border-left: 5px solid #0d6efd;
        }

        #battery_preview .card {
            border-left: 5px solid #198754;
        }

        /* navbar shadow */
        .navbar {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* page title area */
        .hero-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero-title h1 {
            font-weight: 700;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 sticky-top">
        <div class="container-fluid">
            <!-- Brand -->
            <a class="navbar-brand fw-bold" href="index.html">SMP</a>

            <!-- Toggler/collapsible Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="reports.html">Reports</a>
                    </li>
                </ul>

                <!-- User/Login Section -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            <i class="bi bi-person-circle"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container hero-title">
        <!-- <h5>Service Management Platform</h5> -->
        <h5 class="text-light">Tyre Clinic & Battery Service</h5>
    </div>
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-12 text-center">

                <div class="btn-group">

                    <button class="btn btn-outline-primary active shadow text-white" id="clinic_btn">
                        Tyre Clinic Service
                    </button>

                    <button class="btn btn-outline-success text-white" id="battery_btn">
                        Battery Sale / Rental
                    </button>

                </div>

            </div>
        </div>
        <div class="row">
            <div class="col-md-12 d-flex justify-content-center gap-5" id="tyre_clinic_div">
                <div class="card shadow col-md-6">
                    <div class="card-header bg-primary text-white">
                        <h4>Tyre Clinic Service</h4>
                    </div>
                    <div class="card-body">
                        <form id="tyreServiceForm">
                            <div id="message"></div>
                            <div class="mb-3">
                                <label class="form-label">Vehicle Plate Number</label>
                                <input type="text" id="numberPlate" id="numberPlate" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Select Service(s)</label>
                                <!-- load the services dynamically -->
                                <div id="services_body"></div>

                            </div>
                            <div class="text-end">
                                <button type="submit" class="btn btn-primary">Save Service</button>

                            </div>


                            <div class="mt-3">
                                <strong>Running Total Revenue:</strong>
                                <span id="tyreRunningTotal">0</span>
                            </div>

                        </form>
                    </div>
                </div>
                <div class="col-md-3" id="tyre_preview">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h4><i>Transaction Preview</i></h4>
                        </div>
                        <div class="card-body">
                            <p class="text-light">
                                <small>Selected services and estimated total will appear here.</small>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-12 d-flex justify-content-center gap-5 d-none" id="battery_div">
                <div class="card shadow col-md-6">
                    <div class="card-header bg-success text-white">
                        <h4>Battery Sale / Rental</h4>
                    </div>
                    <div class="card-body">
                        <form id="batteryForm">

                            <div id="bmessage"></div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Vehicle Plate Number</label>
                                        <input type="text" id="batteryPlate" name="batteryPlate" class="form-control">
                                    </div>
                                </div>
                                <div class="col-md-6">

                                    <div class="mb-3">
                                        <label class="form-label">Customer Name</label>
                                        <input type="text" id="customerName" name="customerName" class="form-control">
                                    </div>
                                </div>

                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Transaction Type</label>
                                        <select id="transactionType" name="transactionType" class="form-select">
                                            <option value="">Select Type</option>
                                            <option value="sale">Sale</option>
                                            <option value="rental">Rental</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Battery Model</label>
                                        <select id="batteryModel" name="batteryModel" class="form-select">
                                            <option value="">Select Battery</option>
                                            <div id="model_body"></div>
                                        </select>
                                    </div>
                                </div>
                                <!-- <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Battery Price</label>
                                        <input type="number" id="batteryPrice" class="form-control" readonly>
                                    </div>
                                </div> -->

                            </div>

                            <div class="text-end">
                                <button type="submit" class="btn btn-success">Save Transaction</button>

                            </div>

                            <div class="mt-3">
                                <strong>Running Total Revenue:</strong>
                                <span id="batteryRunningTotal">0</span>
                            </div>

                        </form>
                    </div>
                </div>
                <div class="col-md-3" id="battery_preview">
                    <div class="card shadow">
                        <div class="card-header bg-success text-white">
                            <h4><i>Transaction Preview</i></h4>
                        </div>
                        <div class="card-body">
                            <p><i><small>Preview data goes here</small></i></p>
                        </div>
                    </div>
                </div>
            </div>


        </div>

    </div>


    </div>
    <script src="./assets/js/services.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
