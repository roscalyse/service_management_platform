<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        /* make the services column wrap and prevent overflow */
        #tyreTable td:nth-child(2) {
            word-wrap: break-word;
            white-space: normal;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url("https://images.unsplash.com/photo-1607860108855-64acf2078ed9");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
        }
    </style>
</head>

<body>
    <!-- shared nav -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 sticky-top">
        <div class="container-fluid">
            <!-- Brand -->
            <a class="navbar-brand fw-bold" href="index.html">SMP</a>

            <!-- Toggler/collapsible Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="reports.html">Reports</a>
                    </li>
                </ul>

                <!-- User/Login Section -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            <i class="bi bi-person-circle"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container hero-title text-center mb-4">
        <h4>Tyre and Battery Service Reports</h4>
    </div>
    <div class="container">

        <div class="row p-3 d-flex justify-content-center align-items-center">
            <div class="col-md-6 d-flex justify-content-center align-items-center">
                <button class="btn btn-outline-info active shadow text-white" id="clinic_btn">Tyre Service
                    Records</button>
                <button class="btn btn-outline-success shadow text-white" id="battery_btn">Battery Transactions</button>

            </div>
        </div>
        <div class="card shadow" id="tyre_table">
            <div class="card-header bg-info text-white">
                <h4>Tyre Service Records</h4>
            </div>
            <div class="card-body">

                <div class="mb-3">
                    <select id="tyreFilter" class="form-select w-25">
                        <option value="all">All Services</option>
                        <option value="pressure">Pressure</option>
                        <option value="puncture">Puncture</option>
                        <option value="valve">Valve</option>
                    </select>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-striped" id="tyreTable">
                        <colgroup>
                            <col style="width:15%">
                            <col style="width:35%">
                            <col style="width:15%">
                            <col style="width:15%">
                            <col style="width:20%">
                        </colgroup>
                        <thead class="table-dark">
                            <tr>
                                <th>Plate</th>
                                <th>Services</th>
                                <th>Total Price</th>
                                <th>Attendant</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div>
                    <strong>Total Revenue:</strong>
                    <span id="tyreTotalRevenue">0</span>
                </div>

            </div>
        </div>
        <div class="card shadow d-none" id="battery_table">
            <div class="card-header bg-success text-white">
                <h4>Battery Transactions</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Filter by transaction type</label>
                    <select id="batteryFilter" class="form-select w-25">
                        <option value="all">All</option>
                        <option value="sale">Sale</option>
                        <option value="rental">Rental</option>
                    </select>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-striped" id="batteryTable">
                        <thead class="table-dark">
                            <tr>
                                <th>Plate</th>
                                <th>Type</th>
                                <th>Battery Model</th>
                                <th>Price</th>
                                <th>Customer</th>
                                <th>Attendant</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div>
                    <strong>Total Revenue:</strong>
                    <span id="batteryTotalRevenue">0</span>
                </div>

            </div>
        </div>
    </div>
    <script src="./assets/js/reports.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
